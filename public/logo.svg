<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 60" width="200" height="60">
  <defs>
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563EB;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e40af;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <!-- Logo Container -->
  <rect x="10" y="10" width="40" height="40" rx="8" fill="url(#logoGrad)" filter="url(#shadow)"/>
  
  <!-- TW Text -->
  <text x="30" y="35" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="white" text-anchor="middle">TW</text>
  
  <!-- TeamWave Text -->
  <text x="60" y="25" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#2563EB">Team</text>
  <text x="60" y="45" font-family="Arial, sans-serif" font-size="20" font-weight="300" fill="#1e40af">Wave</text>
  
  <!-- Chat Bubbles -->
  <circle cx="160" cy="20" r="8" fill="#2563EB" opacity="0.8"/>
  <circle cx="175" cy="15" r="6" fill="#1e40af" opacity="0.6"/>
  <circle cx="185" cy="25" r="7" fill="#2563EB" opacity="0.7"/>
  <circle cx="170" cy="35" r="5" fill="#1e40af" opacity="0.5"/>
  <circle cx="180" cy="40" r="6" fill="#2563EB" opacity="0.6"/>
</svg>
